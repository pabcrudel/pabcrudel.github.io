name: Testing using Vitest

on:
  workflow_dispatch:
  push:
    branches:
      - nextjs
    paths:
      - .github/workflows/test.yml
      - __tests__

jobs:
  test:
    runs-on: ubuntu-latest
    name: Testing
    steps:
      - name: Checkout files
        uses: actions/checkout@v3

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Install dependencies
        run: pnpm install

      - name: Check Linter
        run: pnpm run lint

      - name: Check code
        run: pnpm run test
